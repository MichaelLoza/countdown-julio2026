<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio Halo Fest 2026 - Eternal Requiem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* elimina scroll */
    }
    body {
      background-image: url("https://raw.githubusercontent.com/MichaelLoza/countdown-julio2026/main/Master.webp");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .overlay {
      background: rgba(0, 0, 0, 0.5);
      height: 100vh; /* ocupa toda la pantalla */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10px;
      box-sizing: border-box;
    }
    .halo-title-img {
      max-width: 1500px; /* tamaño máximo en PC */
      width: 100%;
      height: auto;
      margin-bottom: 20px;
    }
    #countdown { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      flex-wrap: nowrap; /* siempre en una sola fila */
    }
    #countdown div {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      min-width: 70px;
      color: #fff;
    }
    #countdown span { font-size: 1.8em; display: block; }
    #countdown p { margin: 0; font-size: 0.9em; }
    #music-control {
      margin-top: 20px; padding: 8px 16px; font-size: 1em;
      border: none; border-radius: 5px;
      background-color: #1db954; color: #fff; cursor: pointer;
    }
    #music-control:hover { background-color: #14833b; }

    /* Ajustes para pantallas pequeñas */
    @media (max-width: 600px) {
      .halo-title-img { max-width: 250px; }
      #countdown { gap: 8px; }
      #countdown div { min-width: 55px; padding: 6px; }
      #countdown span { font-size: 1.2em; }
      #countdown p { font-size: 0.7em; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <!-- Título con tipografía Halo desde FontMeme -->
    <a href="https://fontmeme.com/es/fuente-de-halo/">
      <img class="halo-title-img" src="https://fontmeme.com/permalink/260629/ec9ec0a2.png" alt="Halo Fest 2026" border="0">
    </a>

    <div id="countdown">
      <div><span id="days"></span><p>Días</p></div>
      <div><span id="hours"></span><p>Horas</p></div>
      <div><span id="minutes"></span><p>Minutos</p></div>
      <div><span id="seconds"></span><p>Segundos</p></div>
    </div>
    <button id="music-control">🔊 Activar música</button>
  </div>

  <!-- Música de fondo -->
  <audio id="bg-music" autoplay muted loop>
    <source src="https://raw.githubusercontent.com/MichaelLoza/countdown-julio2026/main/HALOTHEME.mpeg" type="audio/mpeg">
  </audio>

  <script>
    // Fecha objetivo: 4 de julio de 2026 a las 10:00 PM
    const targetDate = new Date("July 4, 2026 22:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;

      if (distance < 0) {
        document.getElementById("countdown").innerHTML = "<h2>¡Llegó el Halo Fest 2026!</h2>";
      }
    }
    setInterval(updateCountdown, 1000);

    const music = document.getElementById("bg-music");
    const btn = document.getElementById("music-control");
    btn.addEventListener("click", () => {
      music.muted = false; // quita mute al primer clic
      if (music.paused) {
        music.play();
        btn.textContent = "🔇 Pausar música";
      } else {
        music.pause();
        btn.textContent = "🔊 Activar música";
      }
    });
  </script>
</body>
</html>
